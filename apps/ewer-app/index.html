<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experiment-Wise Error Rate | MA255</title>
    <script>
      // Ensure cross-origin isolation for SharedArrayBuffer (needed by WebR)
      if (!window.crossOriginIsolated && !window.location.search.includes("coi=1")) {
        const url = new URL(window.location);
        url.searchParams.set("coi", "1");
        window.location.replace(url.toString());
      }
    </script>
    <script
      src="./shinylive/load-shinylive-sw.js"
      type="module"
    ></script>
    <script type="module">
      import { runExportedApp } from "./shinylive/shinylive.js";
      runExportedApp({
        id: "root",
        appEngine: "r",
        relPath: "",
      });
    </script>
    <link rel="stylesheet" href="./shinylive/style-resets.css" />
    <link rel="stylesheet" href="./shinylive/shinylive.css" />
    
  </head>
  <body>
    
    <div style="height: 100vh; width: 100vw" id="root"></div>
    
  </body>
</html>
